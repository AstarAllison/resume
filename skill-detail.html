        .tag-list { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
        .tag-list span {
            padding: 5px 15px; background: var(--light); border-radius: var(--radius-full);

                    { title: '全英文硕士课程学习', desc: '在布里斯托大学完成全英文授课的硕士课程，包括课堂讨论、学术论文写作、小组汇报等环节，在沉浸式英语环境中提升了学术英语应用能力。' },
                    { title: '英文专业报告撰写', desc: '撰写多篇英文专业课程论文和研究报告，包括文献综述、研究方法设计和数据分析呈现，具备英文学术写作的规范性和专业性。' },
                    { title: '跨文化团队协作', desc: '与国际学生组成跨文化团队完成课程项目，通过英文进行项目讨论、任务分配和成果汇报，积累了跨文化团队协作经验。' }
                ],
                related: [
                    { text: '布里斯托大学硕士教育背景', link: 'education-detail-master.html' },
                    { text: '日语辅修经历', link: 'campus-detail-japanese.html' }
                ]
            },
            'global-view': {
                category: '跨文化沟通', categoryIcon: 'fa-globe',
                title: '国际化视野',
                summary: '拥有英国布里斯托大学硕士留学经历和国内上海对外经贸大学本科学历，具备中日英多语言能力和跨文化沟通经验，能够适应国际化工作环境。',
                tools: ['留学经历', '跨文化沟通', '多语言能力', '国际团队协作', '全球化视野'],
                projects: [
                    { title: '英国留学适应与成长', desc: '在英国布里斯托大学攻读硕士学位期间，适应全新的学术体系和文化环境，积极参与校园活动和学术交流，拓展了国际化人脉和视野。' },
                    { title: '跨文化项目经验', desc: '在多元文化团队中完成课程项目和学术任务，包括与国际学生协作完成案例分析、研究报告和课堂展示，提升跨文化协作能力。' },
                    { title: '中日英三语能力整合', desc: '整合中英双语学习经验和日语辅修经历，形成中日英三语种的语言能力矩阵，能够在多语言环境中进行高效沟通和信息处理。' }
                ],
                related: [
                    { text: '布里斯托大学硕士教育背景', link: 'education-detail-master.html' },
                    { text: '日语辅修经历', link: 'campus-detail-japanese.html' }
                ]
            }
        };

        const data = skillData[skillKey];

        if (!data) {
            document.getElementById('skillContent').innerHTML = `
                <div style="text-align:center;padding:80px 20px;">
                    <i class="fas fa-search" style="font-size:3rem;color:var(--text-light);display:block;margin-bottom:16px;"></i>
                    <p style="color:var(--text-light);font-size:1rem;">未找到对应的能力详情</p>
                    <p style="color:var(--text-light);font-size:0.85rem;margin-top:8px;">参数: ${skillKey}</p>
                </div>`;
            // 即使没有数据也初始化导航
            initPageNav({ relatedSections: ['experience', 'projects', 'campus', 'portfolio'], fallbackSection: 'skills' });
            return;
        }

        let projectsHtml = '';
        if (data.projects && data.projects.length > 0) {
            projectsHtml = data.projects.map(p => `
                <div class="project-card">
                    <h4>${p.title}</h4>
                    <p>${p.desc}</p>
                </div>
            `).join('');
        }

        let toolsHtml = '';
        if (data.tools && data.tools.length > 0) {
            toolsHtml = data.tools.map(t => `<span>${t}</span>`).join('');
        }

        let relatedHtml = '';
        if (data.related && data.related.length > 0) {
            relatedHtml = '<ul>' + data.related.map(r =>
                `<li><i class="fas fa-link"></i> <a href="${r.link}" style="color:var(--primary);text-decoration:none;">${r.text} <i class="fas fa-external-link-alt" style="font-size:0.7rem;"></i></a></li>`
            ).join('') + '</ul>';
        } else {
            relatedHtml = '<p style="color:var(--text-light);font-size:0.9rem;font-style:italic;">相关经历页面持续更新中...</p>';
        }

        // 动态内容（不含返回按钮，由 page-nav.js 统一处理）
        document.getElementById('skillContent').innerHTML = `
            <div class="detail-header">
                <div class="detail-breadcrumb">
                    <i class="fas ${data.categoryIcon}"></i> ${data.category} <i class="fas fa-chevron-right"></i> ${data.title}
                </div>
                <h1 class="detail-title">${data.title}</h1>
                <p class="detail-subtitle">${data.summary}</p>
            </div>

            <div class="detail-section">
                <h3><i class="fas fa-tools"></i> 掌握工具</h3>
                <div class="tag-list">${toolsHtml}</div>
            </div>

            <div class="detail-section">
                <h3><i class="fas fa-project-diagram"></i> 相关项目经验</h3>
                ${projectsHtml}
            </div>

            <div class="detail-section">
                <h3><i class="fas fa-link"></i> 关联经历页面</h3>
                ${relatedHtml}
            </div>
        `;

        // 页面标题
        document.title = `${data.title} — ${data.category} — 苏欣彤 Allison`;

        // 初始化智能导航（可从核心能力跳转到各详情页，也可返回其他板块）
        initPageNav({
            relatedSections: ['experience', 'projects', 'campus', 'portfolio'],
            fallbackSection: 'skills'
        });
    })();
    </script>
</body>
